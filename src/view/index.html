<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; img-src %CSP_SOURCE% data: https:; script-src %CSP_SOURCE%; style-src 'unsafe-inline' %CSP_SOURCE%; media-src %CSP_SOURCE%;" />
  <title>Shotly</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="../dist/webview/index.js" type="module"></script>
</head>

<body>
  <div id="actions-container">
    <button id="save"><img class="shutter" src="/assets/img/save.png" alt="Shutter" /></button>
    <button id="copy"><img class="shutter" src="/assets/img/copy.png" alt="Copy" /></button>
  </div>

  <div id="snippet-scroll">
    <div id="snippet-container">
      <div id="window">
        <div id="navbar">
          <div id="window-controls">
            <div class="red dot"></div>
            <div class="yellow dot"></div>
            <div class="green dot"></div>
          </div>
          <div id="watermark"></div>
          <div id="window-title"></div>
        </div>
        <div id="snippet"></div>
      </div>
    </div>
  </div>

  <div id="flash-fx"></div>
  <audio id="shutter-sound" src="%SHUTTER_SOUND%"></audio>
</body>

</html>
