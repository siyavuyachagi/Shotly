name: Publish to VS Code Marketplace

on:
  push:
    branches:
      - production

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}
